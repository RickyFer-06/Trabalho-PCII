<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Trading</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css')}}">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { max-width: 400px; width: 100%; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="text-center text-primary mb-4">Login</h2>
        <form action="/chklogin" method="POST">
            <div class="mb-3">
                <label for="user" class="form-label">User:</label>
                <input type="text" class="form-control" id="user" name="user" value="{{user}}" required placeholder="Inserir utilizador">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password:</label>
                <input type="password" class="form-control" id="password" name="password" value="{{password}}" required placeholder="Inserir palavra-passe">
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Voltar</a>
            </div>
            <div class="text-center mt-3">
                <small class="text-muted">Acesso admin: Utilizador <b>admin</b> | Palavra-passe <b>admin</b></small>
            </div>
        </form>
        {% if resul %}
        <br>
        <div class="alert alert-danger text-center" role="alert">
            {{ resul }}
        </div>
        {% endif %}
    </div>
</body>
</html>
